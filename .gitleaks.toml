# Gitleaks configuration
# https://github.com/gitleaks/gitleaks#configuration

title = "Gitleaks config for chezmoi dotfiles"

[allowlist]
description = "Allowlist for template files, tests, and age-encrypted dotfiles"
paths = [
  '''.*\.tmpl$''',
  '''.*\.kdbx\.age$''',
  '''test_.*\.sh$''',
  '''tests/.*''',
  '''README\.md$''',
]
